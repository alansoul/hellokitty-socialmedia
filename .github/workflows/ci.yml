# <-- Main Pull Request Pipeline

name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

# 🛑 CONCURRENCY: If a dev pushes multiple times rapidly, cancel the old runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # If using Nx Cloud for remote caching (Highly recommended for large repos)
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  main-ci:
    name: Validate Workspace
    runs-on: ubuntu-latest
    
    # Security: Grant only the minimum required permissions
    permissions:
      contents: read
      actions: read

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v4
        with:
          # REQUIRED for Nx Affected! It needs Git history to compare branches.
          fetch-depth: 0

      # 🚀 Use our custom Composite Action defined above!
      - name: 🛠️ Setup Workspace
        uses: ./.github/actions/setup-workspace

      # 🧠 Figure out the base/head commit for Nx
      - name: 🔍 Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      # --- START NX AFFECTED COMMANDS ---
      
      - name: 💅 Check Formatting
        run: pnpm nx format:check

      - name: 🧹 Lint Affected
        working-directory: ./hellokitty
        run: pnpm nx affected -t lint --parallel=3

      - name: 🧪 Test Affected
        working-directory: ./hellokitty
        run: pnpm nx affected -t test --parallel=3 --configuration=ci

      - name: 🏗️ Build Affected
        working-directory: ./hellokitty
        run: pnpm nx affected -t build --parallel=3