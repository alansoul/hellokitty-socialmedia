# <-- Automated Release Pipeline (Optional)

name: Automated Release

on:
  push:
    branches:
      - master # Triggers when PRs are merged to master

permissions:
  contents: write # ⚠️ CRITICAL: Needed for the bot to push tags and create GitHub Releases
  issues: write

jobs:
  release:
    name: Version, Changelog & Release
    runs-on: ubuntu-latest

    # ENTERPRISE TRICK: Prevent infinite loops.
    # Do not run this action if the commit was made by the release bot itself.
    if: "!contains(github.event.head_commit.message, 'chore(release)')"

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to calculate changelog differences

      - name: ⚙️ Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './hellokitty/pnpm-lock.yaml' # Point to the lockfile

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔐 Configure Git Bot Identity
        # This tells Git WHO is making the version bumps
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🚀 Run Nx Release
        # This command will automatically:
        # 1. Bump versions in package.json files
        # 2. Generate CHANGELOG.md based on your PR titles
        # 3. Create a GitHub Release with notes
        # 4. Commit and push the changes back to master
        run: pnpm nx release --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # Uncomment if publishing libraries to NPM registry
