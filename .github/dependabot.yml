# .github/dependabot.yml
version: 2
updates:
  # Maintain dependencies for pnpm
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'

  # Maintain Docker images (Postgres, Redis, Kong)
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'chore(docker)'
