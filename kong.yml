_format_version: '3.0'

services:
  # -----------------------------------------------------
  # 1. AUTH DOMAIN (Identity, Login, MFA)
  # -----------------------------------------------------
  - name: auth-api-service
    # host.docker.internal points back to your Windows machine (Port 3001)
    url: http://host.docker.internal:3001
    routes:
      - name: auth-routes
        paths:
          - /api/auth     # All login/signup requests go here
        strip_path: false # Keeps the '/api/auth' prefix when sending to NestJS

  # -----------------------------------------------------
  # 2. SOCIAL DOMAIN (Posts, Likes, Comments, Profiles)
  # -----------------------------------------------------
  - name: social-api-service
    # host.docker.internal points back to your Windows machine (Port 3002)
    url: http://host.docker.internal:3002
    routes:
      - name: social-routes
        paths:
          - /api/posts    # The posts controller we just moved!
          - /api/profiles # For user social profiles
          - /api/comments # For post comments
        strip_path: false

# ✨ ENTERPRISE ADDITION: Global Plugins
plugins:
  - name: rate-limiting
    config:
      minute: 100        # Allow 100 requests per minute per user
      policy: local
      fault_tolerant: true