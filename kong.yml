_format_version: '3.0'

services:
  # -----------------------------------------------------
  # 1. AUTH API GATEWAY (Identity, OIDC, Oauth, Admin Management)
  # -----------------------------------------------------
  - name: auth-api-service
    # host.docker.internal points back to your local machine (Port 3001)
    url: http://host.docker.internal:3001
    routes:
      - name: auth-routes
        paths:
          - /api/auth # Signup, Login, MFA
          - /api/oauth # Authorize, Token exchange
          - /api/.well-known # OIDC Discovery & JWKS key board
          - /api/oidc # UserInfo Profile endpoint
          - /api/users # Admin user directory
          - /api/applications # Admin applications registry
          - /api/organizations # Admin B2B workspaces
          - /api/logs # Admin immutable auditing logs
        strip_path: false # Keeps the '/api' prefix when routing to NestJS

  # -----------------------------------------------------
  # 2. SOCIAL API GATEWAY (Feed, Posts, Comments, Profiles)
  # -----------------------------------------------------
  - name: social-api-service
    url: http://host.docker.internal:3002
    routes:
      - name: social-routes
        paths:
          - /api/posts
          - /api/profiles
          - /api/comments
        strip_path: false

# Global Rate Limiting to prevent brute-force attacks
plugins:
  - name: rate-limiting
    config:
      minute: 100
      policy: local
      fault_tolerant: true
